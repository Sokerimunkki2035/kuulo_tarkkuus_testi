<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus v24.1 - Itsmyid Oy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #050505; color: #eee; text-align: center; }
        .card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; margin-top: 20px; }
        .btn { border: none; padding: 25px; border-radius: 15px; cursor: pointer; font-size: 1.2em; font-weight: bold; width: 100%; margin: 10px 0; color: white; }
        .btn-blue { background: #0056b3; }
        .btn-green { background: #1e7e34; }
        .btn-orange { background: #d39e00; }
        .btn-red { background: #bd2130; }
        #display { font-size: 3.5em; font-weight: bold; margin: 20px 0; color: #007bff; }
        .db-info { font-size: 1.5em; color: #666; }
        .chart-container { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="mainMenu" class="card">
        <h1>Focus v24.1</h1>
        <p>Stressitön testi. Käyrä piilotettu testin ajaksi.</p>
        <button onclick="startTest()" class="btn btn-blue">ALOITA TESTI</button>
    </div>

    <div id="testArea" class="card" style="display:none;">
        <div id="earTag" style="font-weight:bold; font-size: 1.5em; letter-spacing: 2px;">VASEN KORVA</div>
        <div id="display">1000 Hz</div>
        <div id="dbDisplay" class="db-info">Voimakkuus: 0 dB</div>

        <button onmousedown="playTone()" onmouseup="stopTone()" ontouchstart="playTone()" ontouchend="stopTone()" class="btn btn-blue" style="height: 120px; font-size: 1.5em;">
            SOITA ÄÄNI
        </button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button onclick="recordHeard('clearly')" class="btn btn-green">KUULIN</button>
            <button onclick="recordHeard('barely')" class="btn btn-orange">VÄHÄN</button>
            <button onclick="recordHeard('none')" class="btn btn-red">EN</button>
        </div>
    </div>

    <div id="resultArea" class="card" style="display:none;">
        <h2>Tulokset</h2>
        <div class="chart-container" id="chartBox">
            <canvas id="resultChart"></canvas>
        </div>
        <button onclick="location.reload()" class="btn btn-blue" style="margin-top:20px;">PALAA ALKUUN</button>
    </div>

    <script>
        let audioCtx, gainNode, pannerNode, osc;
        const freqs = [250, 500, 1000, 2000, 4000, 8000];
        let s = { ear: 'L', idx: 0, db: 0, results: [] };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
        }

        function startTest() {
            initAudio();
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('display').innerText = freqs[s.idx] + " Hz";
            document.getElementById('dbDisplay').innerText = s.db + " dB";
            const et = document.getElementById('earTag');
            et.innerText = (s.ear === 'L' ? "VASEN" : "OIKEA") + " KORVA";
            et.style.color = s.ear === 'L' ? '#007bff' : '#dc3545';
        }

        function playTone() {
            if (osc) return;
            osc = audioCtx.createOscillator();
            osc.frequency.value = freqs[s.idx];
            pannerNode.pan.value = s.ear === 'L' ? -1 : 1;
            // Puhdas gain ilman ylimääräisiä filttereitä tai suhinaa
            gainNode.gain.setValueAtTime(Math.pow(10, s.db/20), audioCtx.currentTime);
            osc.connect(gainNode);
            osc.start();
        }

        function stopTone() { if (osc) { osc.stop(); osc.disconnect(); osc = null; } }

        function recordHeard(type) {
            if (type === 'clearly') { s.db -= 10; }
            else if (type === 'barely') { s.db -= 4; }
            else {
                s.results.push({f: freqs[s.idx], e: s.ear, d: s.db});
                s.idx++;
                s.db = 0; // Nollataan voimakkuus uudelle taajuudelle
            }

            // Jos kaikki taajuudet tehty yhdelle korvalle
            if (s.idx >= freqs.length) {
                if (s.ear === 'L') {
                    s.ear = 'R';
                    s.idx = 0;
                    s.db = 0;
                } else {
                    finish();
                    return;
                }
            }
            updateUI();
        }

        function finish() {
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('chartBox').style.display = 'block';
            drawChart();
        }

        function drawChart() {
            const ctx = document.getElementById('resultChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Vasen (L)', data: s.results.filter(r=>r.e==='L').map(r=>({x:r.f, y:r.d})), borderColor: 'blue', backgroundColor: 'blue', tension: 0 },
                        { label: 'Oikea (R)', data: s.results.filter(r=>r.e==='R').map(r=>({x:r.f, y:r.d})), borderColor: 'red', backgroundColor: 'red', tension: 0 }
                    ]
                },
                options: {
                    scales: {
                        x: { type: 'logarithmic', grid: { color: '#ccc' }, ticks: { callback: v => v + 'Hz' } },
                        y: { reverse: true, min: -100, max: 0, ticks: { stepSize: 10 }, grid: { color: '#ddd' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
