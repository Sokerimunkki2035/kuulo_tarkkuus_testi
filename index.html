<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Precision v19: Pystysuora Integraatio</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXX');
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f8f9fa; color: #333; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.2s; color: white; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-start { background: #007bff; width: 100%; }
        .btn-no { background: #dc3545; }
        .btn-little { background: #fd7e14; }
        .btn-yes { background: #28a745; }
        .stats { display: flex; justify-content: space-around; background: #f1f3f5; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .ear-tag { padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .tag-l { background: #cfe2f3; color: #073763; }
        .tag-r { background: #f4cccc; color: #660000; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Focus Precision v19</h1>
        <p>Tarkkuustesti (50/100/200Hz askeleilla). Testataan kumpikin korva erikseen.</p>
        <div id="statusArea">
            <button id="startBtn" onclick="startTestSequence()" class="btn btn-start">Aloita testi</button>
        </div>
        <div class="stats">
            <div>Mittaukset: <span id="statCount">0</span></div>
            <div>Onnistumis-%: <span id="statRate">0</span>%</div>
        </div>
    </div>

    <div class="card" id="testArea" style="display:none;">
        <h3>Käynnissä: <span id="currentEar" class="ear-tag tag-l">Vasen korva</span></h3>
        <p>Nyt testataan taajuutta: <strong><span id="currentFreq">--</span> Hz</strong></p>
        
        <button id="playBtn" onclick="playCurrentTone()" class="btn btn-start" style="width:100%;">Soita piippaus</button>
        
        <div class="btn-group" id="inputBtns" style="visibility:hidden;">
            <button onclick="handleResponse('no')" class="btn btn-no">En kuule mitään</button>
            <button onclick="handleResponse('little')" class="btn btn-little">Kuulen vain vähän</button>
            <button onclick="handleResponse('yes')" class="btn btn-yes">Kuulen selvästi</button>
        </div>
    </div>

    <div class="card" id="resultArea" style="display:none;">
        <h3>Testi suoritettu!</h3>
        <p>Käyrä on tallennettu laitteellesi.</p>
        <button onclick="clearHistory()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.8em; margin-top:10px;">Tyhjennä historia</button>
    </div>

    <script>
        let audioCtx, oscillator, gainNode;
        let isPlaying = false;
        
        // Määritellään taajuuspolku ja askeleet
        const lowFreqs = Array.from({length: 8}, (_, i) => 100 + i * 50); // 100, 150... 450 (8 kpl)
        const midFreqs = Array.from({length: 16}, (_, i) => 500 + i * 100); // 500, 600... 2000 (16 kpl)
        const highFreqs = Array.from({length: 16}, (_, i) => 2200 + i * 200); // 2200, 2400... 5200 (16 kpl)
        const allFreqs = [...lowFreqs, ...midFreqs, ...highFreqs];

        let currentTest = {
            ear: 'Vas',
            freqIndex: 0,
            db: -40, // Aloitusvoimakkuus
            saved: []
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.connect(audioCtx.destination);
            }
        }

        function startTestSequence() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('statusArea').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            updateDisplay();
        }

        function updateDisplay() {
            const earSpan = document.getElementById('currentEar');
            earSpan.innerText = currentTest.ear === 'Vas' ? "Vasen korva (L)" : "Oikea korva (R)";
            earSpan.className = `ear-tag tag-${currentTest.ear.toLowerCase()}`;
            document.getElementById('currentFreq').innerText = allFreqs[currentTest.freqIndex];
            document.getElementById('inputBtns').style.visibility = 'hidden';
            document.getElementById('playBtn').disabled = false;
        }

        function playCurrentTone() {
            if (isPlaying) return;
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = allFreqs[currentTest.freqIndex];
            
            // Muunnetaan dB lineaariseksi gainiksi
            const gain = Math.pow(10, currentTest.db / 20);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Fade-in naksahduksen estämiseksi
            gainNode.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.05);

            oscillator.connect(gainNode);
            oscillator.start();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "Ääni soi...";
            document.getElementById('inputBtns').style.visibility = 'visible';
            
            // Analytics
            gtag('event', 'test_play', { 'ear': currentTest.ear, 'frequency': allFreqs[currentTest.freqIndex], 'decibels': currentTest.db });

            // Sammutetaan 1.5 sekunnin kuluttua
            setTimeout(stopTone, 1500);
        }

        function stopTone() {
            if (oscillator) {
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05); // Fade-out
                setTimeout(() => {
                    oscillator.stop();
                    oscillator.disconnect();
                }, 100);
            }
            isPlaying = false;
            document.getElementById('playBtn').innerText = "Soita piippaus";
        }

        function handleResponse(response) {
            // Analytics
            gtag('event', 'test_response', { 'response_type': response, 'ear': currentTest.ear, 'frequency': allFreqs[currentTest.freqIndex] });

            if (response === 'yes') {
                currentTest.db -= 10; // Lasketaan 10dB
                if (currentTest.db < -90) currentTest.db = -90; // Minimivoimakkuus
            } else if (response === 'little') {
                currentTest.db += 2; // Nostetaan 2dB
                if (currentTest.db > 0) currentTest.db = 0; // Maksimivoimakkuus
            } else if (response === 'no') {
                currentTest.db += 5; // Nostetaan 5dB
                if (currentTest.db > 0) currentTest.db = 0;
            }

            // Tallennetun pisteen kriteeri: jos "kuulen vain vähän" tai "kuulen selvästi"
            if (response === 'yes' || response === 'little') {
                saveDataPoint();
                currentTest.freqIndex++; // Siirrytään seuraavaan taajuuteen
                // Palautetaan dB aloitusarvoon seuraavaa taajuutta varten
                currentTest.db = allFreqs[currentTest.freqIndex] > 2000 ? -30 : -40;
            }

            // Tarkistetaan testin tila
            if (currentTest.freqIndex >= allFreqs.length) {
                if (currentTest.ear === 'Vas') {
                    // Siirrytään oikeaan korvaan
                    alert("Vasemman korvan testi valmis. Vaihda kuuloke oikeaan korvaan ja jatka.");
                    currentTest.ear = 'Oik';
                    currentTest.freqIndex = 0;
                    currentTest.db = -40;
                    updateDisplay();
                } else {
                    // Testi kokonaan valmis
                    finishTest();
                }
            } else {
                updateDisplay();
            }
        }

        function saveDataPoint() {
            currentTest.saved.push({
                ear: currentTest.ear,
                freq: allFreqs[currentTest.freqIndex],
                db: currentTest.db
            });
            // Tallenetaan lokaalisti, mutta ei näytetä käyrää vielä
            localStorage.setItem('precision_curve', JSON.stringify(currentTest.saved));
            updateStats();
        }

        function updateStats() {
            const saved = JSON.parse(localStorage.getItem('precision_curve') || "[]");
            document.getElementById('statCount').innerText = saved.length;
            // Esimerkkilaskenta onnistumisprosentille (normaali kuulo vs. heikentynyt)
            const abnormal = saved.filter(s => s.db > -20).length;
            const rate = saved.length > 0 ? Math.round(((saved.length - abnormal) / saved.length) * 100) : 100;
            document.getElementById('statRate').innerText = rate;
        }

        function finishTest() {
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            // Analytics
            gtag('event', 'test_complete', { 'total_points': currentTest.saved.length });
        }

        function clearHistory() {
            if(confirm("Haluatko poistaa tallennetun käyrän?")) {
                localStorage.removeItem('precision_curve');
                location.reload(); // Ladataan sivu uudelleen tilan nollaamiseksi
            }
        }

        // Alustetaan tilastot jos niitä on
        updateStats();
    </script>
</body>
</html>
