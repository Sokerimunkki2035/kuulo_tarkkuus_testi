<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Manual v21.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 20px auto; padding: 20px; background: #0f0f0f; color: #eee; text-align: center; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 20px; border: 1px solid #333; }
        .btn { border: none; padding: 20px; border-radius: 12px; cursor: pointer; font-size: 1.2em; font-weight: bold; width: 100%; margin: 10px 0; color: white; }
        .btn-play { background: #007bff; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        .btn-yes { background: #28a745; }
        .btn-no { background: #dc3545; }
        #display { font-size: 3em; font-weight: bold; color: #007bff; margin: 10px 0; }
        .ear-tag { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .L { color: #4da3ff; } .R { color: #ff4d4d; }
        .db-info { font-size: 1.5em; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h1>Focus Manual v21.1</h1>
        <p>Sinä hallitset ääntä. Paina nappia, kuuntele ja päätä.</p>
        <button onclick="startTest()" class="btn btn-play">ALOITA TESTI</button>
    </div>

    <div id="testArea" class="card" style="display:none;">
        <div id="earTag" class="ear-tag L">VASEN KORVA</div>
        <div id="display">1000 Hz</div>
        <div class="db-info">Voimakkuus: <span id="dbVal">-20</span> dB</div>

        <button onmousedown="playTone()" onmouseup="stopTone()" ontouchstart="playTone()" ontouchend="stopTone()" class="btn btn-play">
            PAINA JA PIDÄ: SOITA
        </button>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="heard(true)" class="btn btn-yes">KUULIN</button>
            <button onclick="heard(false)" class="btn btn-no">EN KUULLUT</button>
        </div>
        
        <p style="font-size: 0.8em; color: #666; margin-top: 15px;">
            Kokeile soittaa lyhyitä piippauksia. Jos tunnistat äänen loppuvan, se lasketaan kuulluksi.
        </p>
    </div>

    <div id="resultArea" class="card" style="display:none;">
        <h2>Tulokset</h2>
        <canvas id="resultChart"></canvas>
        <button onclick="location.reload()" class="btn btn-play" style="margin-top:20px;">UUSI TESTI</button>
    </div>

    <script>
        let audioCtx, gainNode, pannerNode, osc;
        const freqs = [125, 250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
        let s = { idx: 0, db: -20, ear: 'L', results: [] };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
        }

        function startTest() {
            initAudio();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('display').innerText = freqs[s.idx] + " Hz";
            document.getElementById('dbVal').innerText = s.db;
            const et = document.getElementById('earTag');
            et.innerText = (s.ear === 'L' ? "VASEN" : "OIKEA") + " KORVA";
            et.className = "ear-tag " + s.ear;
        }

        function playTone() {
            if (osc) return;
            initAudio();
            osc = audioCtx.createOscillator();
            osc.frequency.value = freqs[s.idx];
            pannerNode.pan.value = s.ear === 'L' ? -1 : 1;
            gainNode.gain.setTargetAtTime(Math.pow(10, s.db/20), audioCtx.currentTime, 0.02);
            osc.connect(gainNode);
            osc.start();
        }

        function stopTone() {
            if (osc) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
                osc.stop(audioCtx.currentTime + 0.05);
                osc = null;
            }
        }

        function heard(yes) {
            if (yes) {
                s.db -= 5; // Lasketaan voimakkuutta kunnes ei enää kuulu
                if (s.db < -90) nextStep();
            } else {
                nextStep(); // Tallennetaan viimeisin kuulunut taso (s.db + 5)
            }
            updateUI();
        }

        function nextStep() {
            // Tallennetaan kynnys (viimeinen taso jolla vielä KUULI, eli db + 5)
            s.results.push({f: freqs[s.idx], e: s.ear, d: s.db + 5});
            
            if (s.ear === 'L') {
                s.ear = 'R';
                s.db = -20;
            } else {
                s.ear = 'L';
                s.db = -20;
                s.idx++;
            }

            if (s.idx >= freqs.length) finish();
        }

        function finish() {
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            drawChart();
        }

        function drawChart() {
            const ctx = document.getElementById('resultChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Vasen (L)', data: s.results.filter(r=>r.e==='L').map(r=>({x:r.f, y:r.d})), borderColor: '#4da3ff', tension: 0.1 },
                        { label: 'Oikea (R)', data: s.results.filter(r=>r.e==='R').map(r=>({x:r.f, y:r.d})), borderColor: '#ff4d4d', tension: 0.1 }
                    ]
                },
                options: {
                    scales: {
                        x: { type: 'logarithmic', title: {display:true, text:'Hz', color:'#888'} },
                        y: { reverse: true, min: -100, max: 0, title: {display:true, text:'dB', color:'#888'} }
                    }
                }
            });
        }
    </script>
</body>
</html>
