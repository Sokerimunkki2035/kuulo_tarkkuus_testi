<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus v25.2 - Full Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 0 auto; padding: 20px; background: #050505; color: #eee; text-align: center; }
        .card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; margin-top: 20px; }
        .btn { border: none; padding: 20px; border-radius: 15px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; margin: 8px 0; color: white; transition: 0.1s; }
        .btn-blue { background: #0056b3; }
        .btn-green { background: #1e7e34; }
        .btn-orange { background: #d39e00; }
        .btn-red { background: #bd2130; }
        .btn-gray { background: #333; font-size: 0.9em; }
        .btn-gray:disabled { opacity: 0.3; cursor: not-allowed; }
        #display { font-size: 3.5em; font-weight: bold; margin: 15px 0; color: #007bff; }
        .db-info { font-size: 1.8em; color: #fff; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .chart-container { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; display: none; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="mainMenu" class="card">
        <h1>Focus v25.2</h1>
        <p>Peruutus-toiminto ja 10 dB ruudukko aktivoitu.</p>
        <button onclick="startTest('basic')" class="btn btn-blue">ALOITA PERUSTESTI</button>
    </div>

    <div id="testArea" class="card" style="display:none;">
        <div id="earTag" style="font-weight:bold; font-size: 1.3em;">VASEN KORVA</div>
        <div id="display">1000 Hz</div>
        <div id="dbDisplay" class="db-info">0 dB</div>

        <button onmousedown="playTone()" onmouseup="stopTone()" ontouchstart="playTone()" ontouchend="stopTone()" class="btn btn-blue" style="height: 100px; font-size: 1.5em; margin-bottom: 20px;">
            SOITA ÄÄNI
        </button>
        
        <div class="control-grid">
            <button onclick="adjustDb(-5)" class="btn btn-green">HILJENNÄ (-5 dB)</button>
            <button onclick="adjustDb(5)" class="btn btn-orange">KOVENNA (+5 dB)</button>
        </div>

        <button onclick="recordFinal()" class="btn btn-red" style="padding: 25px;">TÄMÄ ON RAJA</button>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="goBack()" id="backBtn" class="btn btn-gray" style="flex:1;">PERUUTA</button>
            <button onclick="location.reload()" class="btn btn-gray" style="flex:1;">KESKEYTÄ</button>
        </div>
    </div>

    <div id="resultArea" class="card" style="display:none;">
        <h2 style="color: white;">Kuulokäyrä (10 dB ruudukko)</h2>
        <div class="chart-container" id="chartBox">
            <canvas id="resultChart"></canvas>
        </div>
        <div id="deepDiveButtons" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 5px; margin-top: 20px;"></div>
        <button onclick="location.reload()" class="btn btn-blue" style="margin-top:30px;">VALIKKOON</button>
    </div>

    <script>
        let audioCtx, gainNode, pannerNode, osc;
        const basicFreqs = [125, 250, 500, 1000, 2000, 4000, 8000];
        let currentFreqs = [...basicFreqs];
        let historyStates = []; // TÄMÄ TALLENTAA HISTORIAN
        let s = { mode: 'basic', ear: 'L', idx: 0, db: 0, results: [] };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
        }

        function saveState() {
            historyStates.push(JSON.parse(JSON.stringify(s)));
        }

        function startTest(mode, deepDiveFreq) {
            initAudio();
            s.mode = mode;
            historyStates = [];
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            
            if (mode === 'deepdive') {
                s.idx = 0; s.db = 0; s.ear = 'L';
                currentFreqs = [deepDiveFreq];
            } else {
                s.idx = 0; s.db = 0; s.ear = 'L'; s.results = [];
                currentFreqs = [...basicFreqs];
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('display').innerText = currentFreqs[s.idx % currentFreqs.length] + " Hz";
            document.getElementById('dbDisplay').innerText = s.db + " dB";
            const et = document.getElementById('earTag');
            et.innerText = (s.ear === 'L' ? "VASEN" : "OIKEA") + " KORVA";
            et.style.color = s.ear === 'L' ? '#4da3ff' : '#ff4d4d';
            
            // Peruuta-nappi on päällä vain jos historiassa on jotain
            document.getElementById('backBtn').disabled = historyStates.length === 0;
        }

        function playTone() {
            if (osc) return;
            osc = audioCtx.createOscillator();
            osc.frequency.value = currentFreqs[s.idx % currentFreqs.length];
            pannerNode.pan.value = s.ear === 'L' ? -1 : 1;
            gainNode.gain.setValueAtTime(Math.pow(10, s.db/20), audioCtx.currentTime);
            osc.connect(gainNode);
            osc.start();
        }

        function stopTone() { if (osc) { osc.stop(); osc.disconnect(); osc = null; } }

        function adjustDb(amount) {
            saveState(); // Tallennetaan nykytila ennen muutosta
            s.db += amount;
            if (s.db > 0) s.db = 0;
            if (s.db < -100) s.db = -100;
            updateUI();
        }

        function recordFinal() {
            saveState(); // Tallennetaan nykytila ennen siirtymistä seuraavaan ääneen
            const freq = currentFreqs[s.idx % currentFreqs.length];
            s.results = s.results.filter(r => !(r.f === freq && r.e === s.ear));
            s.results.push({f: freq, e: s.ear, d: s.db});
            
            if (s.mode === 'basic') {
                if (s.ear === 'L') { s.ear = 'R'; s.db = 0; }
                else { s.ear = 'L'; s.db = 0; s.idx++; }
                if (s.idx >= currentFreqs.length) finish(); else updateUI();
            } else {
                if (s.ear === 'L') { s.ear = 'R'; s.db = 0; updateUI(); }
                else { finish(); }
            }
        }

        function goBack() {
            if (historyStates.length > 0) {
                s = historyStates.pop(); // Haetaan edellinen tila
                updateUI();
            }
        }

        function finish() {
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('chartBox').style.display = 'block';
            drawChart();
            const container = document.getElementById('deepDiveButtons');
            container.innerHTML = '';
            basicFreqs.forEach(f => {
                const b = document.createElement('button');
                b.className = 'btn btn-gray'; b.innerText = f + " Hz";
                b.onclick = () => startTest('deepdive', f);
                container.appendChild(b);
            });
        }

        let chartInstance = null;
        function drawChart() {
            const ctx = document.getElementById('resultChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Vasen', data: s.results.filter(r=>r.e==='L').sort((a,b)=>a.f-b.f).map(r=>({x:r.f, y:r.d})), borderColor: 'blue', backgroundColor: 'blue', tension: 0, pointRadius: 5 },
                        { label: 'Oikea', data: s.results.filter(r=>r.e==='R').sort((a,b)=>a.f-b.f).map(r=>({x:r.f, y:r.d})), borderColor: 'red', backgroundColor: 'red', tension: 0, pointRadius: 5 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { 
                            type: 'logarithmic', 
                            min: 100, max: 10000,
                            grid: { color: '#ddd' }, 
                            ticks: { 
                                callback: v => [125,250,500,1000,2000,4000,8000].includes(v) ? v+'Hz' : ''
                            } 
                        },
                        y: { 
                            reverse: true, min: -100, max: 0, 
                            ticks: { stepSize: 10, autoSkip: false }, 
                            grid: { color: '#ccc' } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
