<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Integrated v22.0 - Itsmyid Oy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 20px auto; padding: 20px; background: #0a0a0a; color: #eee; text-align: center; }
        .card { background: #181818; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 20px; border: 1px solid #333; }
        .btn { border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; margin: 8px 0; color: white; transition: 0.2s; }
        .btn-blue { background: #007bff; }
        .btn-purple { background: #6f42c1; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        #display { font-size: 3em; font-weight: bold; color: #007bff; margin: 15px 0; }
        .db-info { font-size: 1.2em; color: #888; margin-bottom: 15px; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 1.2em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="mainMenu" class="card">
        <h1>Focus v22.0</h1>
        <p>Itsmyid Oy - Kuulon seuranta ja treeni</p>
        <button onclick="startMode('tone')" class="btn btn-blue">MANUAALINEN PIIPPAUS</button>
        <button onclick="startMode('game')" class="btn btn-purple">KUULON YMMÄRRYS PELI</button>
        <div id="lastResult" style="margin-top:20px; font-size:0.8em; color:#666;"></div>
    </div>

    <div id="testArea" class="card" style="display:none;">
        <div id="earTag" style="font-weight:bold;">VASEN KORVA</div>
        <div id="display">---</div>
        <div id="dbDisplay" class="db-info">Voimakkuus: -20 dB</div>

        <div id="toneUI" style="display:none;">
            <button onmousedown="playTone()" onmouseup="stopTone()" ontouchstart="playTone()" ontouchend="stopTone()" class="btn btn-blue">
                PAINA JA PIDÄ: SOITA
            </button>
            <div style="display: flex; gap: 10px;">
                <button onclick="recordHeard(true)" class="btn btn-green">KUULIN</button>
                <button onclick="recordHeard(false)" class="btn btn-red">EN KUULLUT</button>
            </div>
        </div>

        <div id="gameUI" style="display:none;">
            <button onclick="playSpeech()" class="btn btn-purple">KUUNTELE</button>
            <input type="text" id="userInput" placeholder="Mitä kuulit?">
            <button onclick="checkGameAnswer()" class="btn btn-green">VASTAA</button>
        </div>
    </div>

    <div id="resultArea" class="card" style="display:none;">
        <h2>Tulokset</h2>
        <canvas id="resultChart"></canvas>
        <button onclick="location.reload()" class="btn btn-blue" style="margin-top:20px;">PALAA VALIKKOON</button>
    </div>

    <script>
        let audioCtx, gainNode, pannerNode, osc;
        const synth = window.speechSynthesis;
        const freqs = [250, 500, 1000, 2000, 4000, 8000];
        const wordPool = ["Sataa", "Lataa", "Varaa", "Kello", "Pallo", "Maito", "Talo"];
        
        let state = {
            mode: '', ear: 'L', idx: 0, db: -20,
            results: [], gameTarget: '', lives: 3
        };

        window.onload = () => {
            const saved = localStorage.getItem('lastFocusResult');
            if (saved) document.getElementById('lastResult').innerText = "Viimeisin testi tallennettu muistiin.";
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
        }

        function startMode(m) {
            initAudio();
            state.mode = m;
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            state.idx = 0; state.db = -20; state.ear = 'L'; state.results = [];
            setupStep();
        }

        function setupStep() {
            document.getElementById('earTag').innerText = (state.ear === 'L' ? "VASEN" : "OIKEA") + " KORVA";
            document.getElementById('earTag').style.color = state.ear === 'L' ? '#4da3ff' : '#ff4d4d';
            
            if (state.mode === 'tone') {
                document.getElementById('display').innerText = freqs[state.idx] + " Hz";
                document.getElementById('toneUI').style.display = 'block';
                document.getElementById('gameUI').style.display = 'none';
            } else {
                document.getElementById('display').innerText = "???";
                document.getElementById('toneUI').style.display = 'none';
                document.getElementById('gameUI').style.display = 'block';
            }
            updateDbDisplay();
        }

        function updateDbDisplay() {
            document.getElementById('dbDisplay').innerText = `Voimakkuus: ${state.db} dB`;
        }

        function playTone() {
            if (osc) return;
            osc = audioCtx.createOscillator();
            osc.frequency.value = freqs[state.idx];
            pannerNode.pan.value = state.ear === 'L' ? -1 : 1;
            gainNode.gain.setTargetAtTime(Math.pow(10, state.db/20), audioCtx.currentTime, 0.02);
            osc.connect(gainNode);
            osc.start();
        }

        function stopTone() {
            if (osc) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
                osc.stop(audioCtx.currentTime + 0.05);
                osc = null;
            }
        }

        function recordHeard(yes) {
            if (yes) {
                state.db -= 5;
                if (state.db < -90) nextStep();
            } else {
                nextStep();
            }
            updateDbDisplay();
        }

        function nextStep() {
            state.results.push({f: freqs[state.idx], e: state.ear, d: state.db + 5});
            if (state.ear === 'L') { state.ear = 'R'; state.db = -20; }
            else { state.ear = 'L'; state.db = -20; state.idx++; }

            if (state.idx >= freqs.length) finish();
            else setupStep();
        }

        function playSpeech() {
            state.gameTarget = Math.random() > 0.5 ? 
                wordPool[Math.floor(Math.random()*wordPool.length)] : 
                Math.floor(1000 + Math.random()*8999).toString();
            const ut = new SpeechSynthesisUtterance(state.gameTarget);
            ut.lang = 'fi-FI';
            ut.volume = Math.pow(10, state.db/20);
            synth.speak(ut);
        }

        function checkGameAnswer() {
            const val = document.getElementById('userInput').value;
            if (!confirm("Oletko varma?")) return;
            if (val.toLowerCase() === state.gameTarget.toLowerCase()) {
                alert("Oikein!"); state.db -= 5;
            } else {
                alert("Väärin! Oikea oli: " + state.gameTarget); state.db += 5;
            }
            setupStep();
        }

        function finish() {
            localStorage.setItem('lastFocusResult', JSON.stringify(state.results));
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            drawChart();
        }

        function drawChart() {
            const ctx = document.getElementById('resultChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Vasen', data: state.results.filter(r=>r.e==='L').map(r=>({x:r.f, y:r.d})), borderColor: '#4da3ff' },
                        { label: 'Oikea', data: state.results.filter(r=>r.e==='R').map(r=>({x:r.f, y:r.d})), borderColor: '#ff4d4d' }
                    ]
                },
                options: { scales: { x: { type: 'logarithmic' }, y: { reverse: true, min: -100, max: 0 } } }
            });
        }
    </script>
</body>
</html>
