<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Precision v19.2: Vertailu & Historia</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f8f9fa; color: #333; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn { border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.2s; color: white; width: 100%; margin-bottom: 10px; }
        .btn-start { background: #007bff; }
        .btn-no { background: #dc3545; }
        .btn-little { background: #fd7e14; }
        .btn-yes { background: #28a745; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8em; }
        .result-table th, .result-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .tag-l { color: #073763; background: #cfe2f3; padding: 2px 5px; border-radius: 3px; }
        .tag-r { color: #660000; background: #f4cccc; padding: 2px 5px; border-radius: 3px; }
        .history-item { border-left: 4px solid #007bff; padding: 10px; margin-bottom: 10px; background: #fff; text-align: left; cursor: pointer; }
        #freqDisplay { font-size: 2.5em; color: #007bff; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <h1>Focus Precision v19.2</h1>
        <p>Tarkkuustesti aikaleimalla ja vertailulla.</p>
        <button onclick="startTestSequence()" class="btn btn-start">Aloita uusi testi</button>
        <div id="historyList"></div>
    </div>

    <div class="card" id="testArea" style="display:none;">
        <h3 id="currentEarHeader">Vasen korva (L)</h3>
        <div id="freqDisplay"><span id="currentFreq">--</span> Hz</div>
        <button id="playBtn" onclick="playCurrentTone()" class="btn btn-start">Soita ääni</button>
        <div id="inputBtns" style="visibility:hidden;">
            <button onclick="handleResponse('yes')" class="btn btn-yes">Kuulen selvästi</button>
            <button onclick="handleResponse('little')" class="btn btn-little">Kuulen vain vähän</button>
            <button onclick="handleResponse('no')" class="btn btn-no">En kuule mitään</button>
        </div>
    </div>

    <div class="card" id="resultArea" style="display:none;">
        <h3>Testi valmis!</h3>
        <p id="testTimestamp"></p>
        <div class="stats-grid">
            <div>
                <h4>Vasen (L)</h4>
                <div id="resultsL"></div>
            </div>
            <div>
                <h4>Oikea (R)</h4>
                <div id="resultsR"></div>
            </div>
        </div>
        <button onclick="location.reload()" class="btn btn-start" style="margin-top:20px;">Palaa alkuun</button>
        <button onclick="clearAllData()" style="color:red; background:none; border:none; cursor:pointer;">Tyhjennä koko historia</button>
    </div>

    <script>
        let audioCtx, oscillator, gainNode, pannerNode;
        let isPlaying = false;
        
        const lowFreqs = Array.from({length: 8}, (_, i) => 100 + i * 50); 
        const midFreqs = Array.from({length: 16}, (_, i) => 500 + i * 100);
        const highFreqs = Array.from({length: 16}, (_, i) => 2200 + i * 200); 
        const allFreqs = [...lowFreqs, ...midFreqs, ...highFreqs];

        let state = { ear: 'L', freqIdx: 0, db: -40, currentSession: [] };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
        }

        function startTestSequence() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            const header = document.getElementById('currentEarHeader');
            header.innerText = state.ear === 'L' ? "Vasen korva (L)" : "Oikea korva (R)";
            header.style.color = state.ear === 'L' ? "#073763" : "#660000";
            document.getElementById('currentFreq').innerText = allFreqs[state.freqIdx];
            document.getElementById('inputBtns').style.visibility = 'hidden';
        }

        function playCurrentTone() {
            if (isPlaying) return;
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = allFreqs[state.freqIdx];
            pannerNode.pan.setValueAtTime(state.ear === 'L' ? -1 : 1, audioCtx.currentTime);
            
            const gain = Math.pow(10, state.db / 20);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.05);
            
            oscillator.connect(gainNode);
            oscillator.start();
            isPlaying = true;
            document.getElementById('inputBtns').style.visibility = 'visible';
            setTimeout(() => {
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                setTimeout(() => { if(oscillator){oscillator.stop(); oscillator.disconnect(); isPlaying = false;} }, 100);
            }, 1500);
        }

        function handleResponse(res) {
            if (res === 'yes') { state.db -= 10; playCurrentTone(); }
            else if (res === 'no') { state.db += 5; playCurrentTone(); }
            else if (res === 'little') {
                state.currentSession.push({ e: state.ear, f: allFreqs[state.freqIdx], d: state.db });
                state.freqIdx++;
                state.db = -40;
                if (state.freqIdx >= allFreqs.length) {
                    if (state.ear === 'L') {
                        alert("Vasen valmis. Vaihda oikeaan.");
                        state.ear = 'R'; state.freqIdx = 0; updateUI();
                    } else { finalize(); }
                } else { updateUI(); }
            }
        }

        function finalize() {
            const timestamp = new Date().toLocaleString('fi-FI');
            const history = JSON.parse(localStorage.getItem('focus_history') || "[]");
            history.push({ time: timestamp, data: state.currentSession });
            localStorage.setItem('focus_history', JSON.stringify(history));
            
            showResults(state.currentSession, timestamp);
        }

        function showResults(data, time) {
            document.getElementById('testArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('testTimestamp').innerText = "Testattu: " + time;
            
            const render = (ear) => data.filter(d => d.e === ear)
                .map(d => `<div style="font-size:0.8em; border-bottom:1px solid #eee;">${d.f}Hz: <strong>${d.d}dB</strong></div>`).join('');
            
            document.getElementById('resultsL').innerHTML = render('L');
            document.getElementById('resultsR').innerHTML = render('R');
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('focus_history') || "[]");
            const list = document.getElementById('historyList');
            if (history.length > 0) list.innerHTML = "<h3>Historia</h3>";
            history.reverse().forEach((session, idx) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<strong>${session.time}</strong> - ${session.data.length} pistettä`;
                div.onclick = () => showResults(session.data, session.time);
                list.appendChild(div);
            });
        }

        function clearAllData() {
            if(confirm("Poistetaanko koko historia?")) {
                localStorage.clear();
                location.reload();
            }
        }

        loadHistory();
    </script>
</body>
</html>
