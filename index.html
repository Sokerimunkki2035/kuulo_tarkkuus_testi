<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus v25.2 - Audio Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: 0 auto; padding: 20px; background: #050505; color: #eee; text-align: center; }
        .card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; margin-top: 20px; }
        .btn { border: none; padding: 20px; border-radius: 15px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; margin: 8px 0; color: white; }
        .btn-blue { background: #0056b3; }
        .btn-green { background: #1e7e34; }
        .btn-orange { background: #d39e00; }
        .btn-red { background: #bd2130; }
        .btn-gray { background: #333; font-size: 0.9em; }
        #display { font-size: 3.5em; font-weight: bold; margin: 15px 0; color: #007bff; }
        .db-info { font-size: 1.8em; color: #fff; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="mainMenu" class="card">
        <h1>Focus v25.2</h1>
        <p>Jos ääntä ei kuulu, varmista että puhelimen merkkiäänet ja median voimakkuus ovat päällä.</p>
        <button onclick="startTest()" class="btn btn-blue">KÄYNNISTÄ TESTI</button>
    </div>

    <div id="testArea" class="card" style="display:none;">
        <div id="earTag" style="font-weight:bold; font-size: 1.3em;">VALMISTELLAAN...</div>
        <div id="display">1000 Hz</div>
        <div id="dbDisplay" class="db-info">Odotetaan...</div>
        
        <button id="playBtn" onmousedown="playTone()" onmouseup="stopTone()" ontouchstart="playTone()" ontouchend="stopTone()" class="btn btn-blue" style="height: 120px; font-size: 1.6em;">
            SOITA ÄÄNI
        </button>
        
        <div class="control-grid" style="margin-top:20px;">
            <button onclick="adjustDb(-5)" class="btn btn-orange">KOVENNA (+5 dB)</button>
            <button onclick="adjustDb(5)" class="btn btn-green">HILJENNÄ (-5 dB)</button>
        </div>
        
        <button onclick="recordFinal()" class="btn btn-red" style="padding: 20px; margin-top:20px;">TÄMÄ ON RAJA</button>
        <button onclick="goBack()" id="backBtn" class="btn btn-gray">PERUUTA</button>
    </div>

    <script>
        let audioCtx, gainNode, pannerNode, osc;
        const freqs = [125, 250, 500, 1000, 2000, 4000, 8000];
        let historyStates = [];
        // Aloitetaan -60 dB:stä, jotta se ei ole täysin mykkä alussa (vastaa 40 dB HL)
        let s = { ear: 'L', idx: 0, db: -60, results: [] };

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                pannerNode = audioCtx.createStereoPanner();
                gainNode.connect(pannerNode).connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }

        async function startTest() {
            await initAudio(); // Aktivoi audio käyttäjän klikkauksesta
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('testArea').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('display').innerText = freqs[s.idx] + " Hz";
            document.getElementById('dbDisplay').innerText = (s.db + 100) + " dB HL";
            const et = document.getElementById('earTag');
            et.innerText = (s.ear === 'L' ? "VASEN" : "OIKEA") + " KORVA";
            et.style.color = s.ear === 'L' ? '#4da3ff' : '#ff4d4d';
        }

        function playTone() {
            if (osc) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            osc = audioCtx.createOscillator();
            osc.frequency.value = freqs[s.idx];
            pannerNode.pan.value = s.ear === 'L' ? -1 : 1;
            
            // Gain-laskenta: varmistetaan ettei mennä yli 0.5 (suojaa korvia)
            let vol = Math.pow(10, s.db/20);
            gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.02);
            
            osc.connect(gainNode);
            osc.start();
            console.log("Soitetaan: " + freqs[s.idx] + "Hz, Voimakkuus: " + s.db + "dB");
        }

        function stopTone() { 
            if (osc) { 
                osc.stop(); 
                osc.disconnect(); 
                osc = null; 
            } 
        }

        function adjustDb(amount) {
            s.db -= (amount * -1); 
            s.db = Math.max(-100, Math.min(-5, s.db));
            updateUI();
        }

        function recordFinal() {
            s.results.push({f: freqs[s.idx], e: s.ear, d: s.db + 100});
            if (s.ear === 'L') { s.ear = 'R'; s.db = -60; }
            else { s.ear = 'L'; s.db = -60; s.idx++; }
            if (s.idx >= freqs.length) alert("Testi valmis! (Kaavion piirto puuttuu tästä pikakorjauksesta)"); 
            else updateUI();
        }
    </script>
</body>
</html>
